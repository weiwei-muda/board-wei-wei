<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wei Wei Board</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dfe3e8;
      --accent: #2563eb;
      --todo: #eff6ff;
      --progress: #fff7ed;
      --done: #ecfdf5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .column {
      min-height: 340px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
    }

    .column.todo .column-header {
      background: var(--todo);
    }

    .column.progress .column-header {
      background: var(--progress);
    }

    .column.done .column-header {
      background: var(--done);
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .cards {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .card-note {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 16px 14px;
    }

    @media (max-width: 820px) {
      .board {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>Wei Wei Board</h1>
        <div class="meta">Webapp board items</div>
      </div>
    </header>

    <section class="board" aria-label="Wei Wei board">
      <article class="column todo">
        <div class="column-header">
          <span>To Do</span>
          <span class="count">1 item</span>
        </div>
        <div class="cards">
          <div class="card">
            <p class="card-title">Reroder Item</p>
            <p class="card-note">Added for Wei Wei.</p>
          </div>
        </div>
      </article>

      <article class="column progress">
        <div class="column-header">
          <span>In Progress</span>
          <span class="count">0 items</span>
        </div>
        <div class="empty">No items yet.</div>
      </article>

      <article class="column done">
        <div class="column-header">
          <span>Done</span>
          <span class="count">0 items</span>
        </div>
        <div class="empty">No completed items yet.</div>
      </article>
    </section>
  </main>
</body>
</html>
